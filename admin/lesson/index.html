<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Редактор урока — Админка Academy Realtors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/styles/system.css">
  <link rel="stylesheet" href="../../assets/styles/admin.css">
</head>
<body class="admin-page" data-grid="light">
  <header class="admin-topbar">
    <div class="admin-shell admin-topbar__inner">
      <div class="admin-topbar__meta">
        <a class="brand" href="../../index.html" aria-label="Академия риэлторов">
          <span class="brand-mark">АР</span>
          <span class="brand-copy">
            <strong>Академия</strong>
            <span>риэлторов</span>
          </span>
        </a>
        <nav class="admin-breadcrumbs" aria-label="Навигация админки">
          <a href="../course/index.html">Создание курса</a>
          <span>/</span>
          <span class="admin-breadcrumbs__current" data-lesson-breadcrumb-title>Урок</span>
        </nav>
      </div>
      <div class="admin-actions">
        <button class="button button-outline" type="button" data-preview-lesson>Предпросмотр</button>
        <button class="button button-dark" type="button" data-save-lesson>Сохранить</button>
      </div>
    </div>
  </header>

  <main class="admin-shell">
    <section class="lesson-stage">
      <div class="lesson-stage__head">
        <div class="lesson-stage__meta">
          <span class="lesson-step">#1 из 2</span>
          <span>/</span>
          <span data-lesson-section>Раздел</span>
        </div>
        <input class="lesson-title-input" type="text" value="Урок" data-lesson-title>
      </div>

      <div class="lesson-canvas">
        <div class="content-toolbar-wrap">
          <div class="content-toolbar" aria-label="Палитра блоков урока">
            <button class="button button-outline admin-entity-button" type="button" data-add-block="text">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 6h14M12 6v12M8 18h8" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
              <span>Текст</span>
            </button>
            <button class="button button-outline admin-entity-button" type="button" data-add-block="photo">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 7h14v10H5z" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/><path d="m8 13 2-2 4 4 2-2 3 3" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/><circle cx="9" cy="10" r="1.2" fill="currentColor"/></svg>
              <span>Фото</span>
            </button>
            <button class="button button-outline admin-entity-button" type="button" data-add-block="video">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 7h11v10H5z" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/><path d="m16 10 4-2v8l-4-2V10Z" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/></svg>
              <span>Видео</span>
            </button>
            <button class="button button-outline admin-entity-button" type="button" data-add-block="file">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 4h7l5 5v11H7z" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/><path d="M14 4v5h5M9 15h6M9 18h4" stroke="currentColor" stroke-linecap="round" stroke-width="2"/></svg>
              <span>Файл</span>
            </button>
            <button class="button button-outline admin-entity-button" type="button" data-add-block="audio">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 18V6l10-2v12" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/><circle cx="7" cy="18" r="3" stroke="currentColor" stroke-width="2"/><circle cx="17" cy="16" r="3" stroke="currentColor" stroke-width="2"/></svg>
              <span>Аудио</span>
            </button>
            <button class="button button-outline admin-entity-button" type="button" data-add-block="test">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 5h10l2 3v11H5V8l2-3Z" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/><path d="M8 12h8M8 16h5" stroke="currentColor" stroke-linecap="round" stroke-width="2"/></svg>
              <span>Тест</span>
            </button>
          </div>
        </div>

        <div class="empty-state" data-empty-state>
          <div>
            <strong>Начните собирать урок</strong>
            <div>Добавьте текст, фото, видео, файл или аудио. Тесты добавляются отдельными пунктами в структуре курса.</div>
          </div>
        </div>

        <div class="content-blocks" data-blocks-root></div>
      </div>
    </section>
  </main>

  <script src="../../assets/scripts/course-store.js"></script>
  <script src="../../assets/scripts/admin-lesson.js"></script>
</body>
</html>
