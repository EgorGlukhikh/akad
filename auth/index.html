<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academy Realtors — Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles/system.css">
  <link rel="stylesheet" href="../assets/styles/auth.css">
</head>
<body class="auth-page" data-grid="light">
  <main class="auth-layout">
    <section class="auth-side" aria-label="Брендовая зона">
      <a class="brand auth-brand auth-brand--inverse" href="../index.html" aria-label="Академия риэлторов">
        <span class="brand-mark">АР</span>
        <span class="brand-copy">
          <strong>Академия</strong>
          <span>риэлторов</span>
        </span>
      </a>
    </section>

    <section class="auth-form-side">
      <div class="auth-form-wrap">
        <div class="auth-panel">
          <div class="auth-panel-header">
            <div class="auth-label">Вход в личный кабинет</div>
            <h1>Вход в&nbsp;обучающую платформу</h1>
            <p>Введите телефон и пароль, чтобы открыть курсы, материалы и свой прогресс по обучению.</p>
          </div>

          <form class="auth-form">
            <label class="field">
              <span class="field-label">Телефон</span>
              <span class="field-control">
                <input class="input" type="tel" inputmode="tel" autocomplete="tel" placeholder="+7 (___) ___-__-__">
              </span>
            </label>

            <label class="field">
              <span class="field-label">Пароль</span>
              <span class="field-control">
                <input class="input input--with-action" type="password" autocomplete="current-password" placeholder="Введите пароль" data-password-input>
                <button class="field-action" type="button" aria-label="Показать пароль" aria-pressed="false" data-password-toggle>
                  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                  </svg>
                </button>
              </span>
            </label>

            <div class="checkbox-row">
              <label class="checkbox-control">
                <input type="checkbox" name="remember">
                <span class="checkbox-box" aria-hidden="true"></span>
                <span>Запомнить меня</span>
              </label>
              <a class="text-link" href="#">Забыли пароль?</a>
            </div>

            <div class="auth-actions">
              <button class="button button-dark" type="submit">Далее</button>
              <a class="button button-outline" href="../admin/courses/index.html">Перейти в админку курсов</a>
              <a class="auth-back-link" href="../index.html">Вернуться на лендинг</a>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="../assets/scripts/auth.js"></script>
</body>
</html>
