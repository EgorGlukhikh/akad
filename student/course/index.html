<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Курс — Academy Realtors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/styles/system.css">
  <link rel="stylesheet" href="../../assets/styles/admin.css">
</head>
<body class="admin-page" data-grid="light">
  <header class="admin-topbar">
    <div class="admin-shell admin-topbar__inner">
      <div class="admin-topbar__meta">
        <a class="brand" href="../../index.html" aria-label="Академия риэлторов">
          <span class="brand-mark">АР</span>
          <span class="brand-copy"><strong>Академия</strong><span>риэлторов</span></span>
        </a>
        <nav class="admin-breadcrumbs" aria-label="Навигация курса">
          <a href="../index.html">Мои курсы</a>
          <span>/</span>
          <span class="admin-breadcrumbs__current" data-course-breadcrumb>Курс</span>
        </nav>
      </div>
      <div class="admin-actions">
        <a class="button button-outline" href="../../admin/courses/index.html">Админка</a>
      </div>
    </div>
  </header>

  <main class="admin-shell builder-layout">
    <section class="student-course-hero">
      <div>
        <div class="eyebrow"><span class="eyebrow-mark">02</span> Структура курса</div>
        <h1 class="admin-display-title" data-course-title>Курс</h1>
        <p class="section-copy" data-course-description></p>
      </div>
      <aside class="student-progress-card">
        <span class="status-pill status-pill--published">Прогресс</span>
        <strong data-course-progress-title>0%</strong>
        <span data-course-progress-copy>0 из 0 обязательных элементов</span>
        <div class="progress-track progress-track--student"><span data-course-progress-bar></span></div>
      </aside>
    </section>

    <section class="builder-card">
      <div class="builder-card__head">
        <div class="builder-card__title">
          <span class="icon-chip">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 7h14M5 12h14M5 17h14" stroke="currentColor" stroke-linecap="round" stroke-width="2"/></svg>
          </span>
          <span>Содержание</span>
        </div>
        <div class="builder-summary" data-course-summary></div>
      </div>
      <div class="student-structure" data-student-structure></div>
    </section>
  </main>

  <script src="../../assets/scripts/course-store.js"></script>
  <script src="../../assets/scripts/student-course.js"></script>
</body>
</html>
